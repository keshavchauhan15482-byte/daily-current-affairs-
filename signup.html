<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | daily current affairs</title>
  <link rel="preconnect" href="https://api.fontshare.com">
  <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@700,800&f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/site.css">
</head>
<body data-page="signup">
  <main class="auth-wrap">
    <section class="auth-card">
      <a class="brand standalone" href="index.html"><span class="brand-mark"></span><span><strong>daily smart current affairs</strong><small>Exam focused newsroom</small></span></a>
      <p class="eyebrow">Create account</p>
      <h1>Build your study profile.</h1>
      <form id="signup-form" class="auth-form">
        <label><span>Name</span><input name="name" placeholder="Your name" required></label>
        <label><span>Target exam</span>
          <select name="exam" required>
            <option value="">Select exam</option>
            <option>UPSC</option>
            <option>SSC</option>
            <option>NDA</option>
            <option>CDS</option>
            <option>PCS</option>
          </select>
        </label>
        <button class="primary-btn full" type="submit">Create account</button>
      </form>
      <p class="muted">This account is stored only for the daily current affairs demo site.</p>
    </section>
  </main>
  <script src="assets/site.js"></script>
</body>
</html>
